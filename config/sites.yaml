# UI自动化测试配置文件
# 使用方法：复制本文件为 config.yaml，填入实际配置
# cp config.yaml.example config.yaml

# 站点配置（支持多站点）
sites:
  "286":
    name: "286站点"
    base_url: "https://your-site-286.com"
    login_url: "https://your-site-286.com"
  "231":
    name: "231站点"
    base_url: "https://your-site-231.com"
    login_url: "https://your-site-231.com"
  "1PG":
    name: "1PG站点"
    base_url: "https://your-site-1pg.com"
    login_url: "https://your-site-1pg.com"
  "g66":
    name: "g66站点"
    base_url: "https://your-site-g66.com"
    login_url: "https://your-site-g66.com"

# 当前使用的站点（可切换）
current_site: "286"

# 应用配置（保留作为默认值）
app:
  base_url: "https://your-site.com"
  login_url: "https://your-site.com"
  success_url_keywords:
    - "lobby"
    - "home"
    - "dashboard"

# 账号配置
account:
  username: "your_username"
  password: "your_password"

# 浏览器配置
browser:
  headless: false
  mobile_emulation: true
  device_width: 375
  device_height: 812
  pixel_ratio: 3.0
  user_agent: "Mozilla/5.0 (iPhone; CPU iPhone OS 16_2 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.2 Mobile/15E148 Safari/604.1"
  
# 登录配置
login:
  timeout: 300
  check_interval: 2
  
  selectors:
    close_popup: "button[class*='close'], [class*='close']"
    login_button: ".login-btn, text=登录"
    username_input: "input[type='text']"
    password_input: "input[type='password']"
    submit_button: ".new-submit-button"
    captcha_element: "[class*='botion_captcha'], [class*='captcha']"

# 缓存配置
cache:
  enabled: true
  expire_hours: 24
  session_name: "default_user"
  cache_dir: "./cache/user_session"

# Token配置
token:
  storage_keys:
    - "token"
    - "auth_token"
    - "access_token"
    - "userToken"
  cookie_names:
    - "token"
    - "session"
    - "sessionId"

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_dir: "./logs"
